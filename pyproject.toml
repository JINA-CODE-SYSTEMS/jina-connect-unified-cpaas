[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "jina_connect.settings"
python_files = ["test_*.py", "tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.bandit]
exclude_dirs = ["tests", "*/tests/*", "*/migrations/*"]
skips = ["B101", "B311"]
