name: twilio_elastic_sip
display_name: "Twilio Elastic SIP Trunking"
notes: |
  Twilio Elastic SIP is separate from the HTTP Voice API (`provider="twilio"`).
  Choose Elastic SIP when you want media on your own infrastructure.
  Uses TLS by default; sip_realm is the per-trunk hostname (e.g.
  `your-trunk.pstn.twilio.com`).

endpoint_template: |
  [{endpoint_id}]
  type=endpoint
  context=jina-voice-inbound
  disallow=all
  allow=ulaw
  allow=opus
  auth={auth_id}
  aors={aor_id}
  from_user={sip_username}
  from_domain={sip_realm}
  dtmf_mode=rfc4733
  transport=transport-tls
  rtp_symmetric=yes
  force_rport=yes
  rewrite_contact=yes

auth_template: |
  [{auth_id}]
  type=auth
  auth_type=userpass
  username={sip_username}
  password={sip_password}
  realm={sip_realm}

aor_template: |
  [{aor_id}]
  type=aor
  contact=sip:{sip_proxy};transport=tls
  qualify_frequency=60

registration_template: ""
