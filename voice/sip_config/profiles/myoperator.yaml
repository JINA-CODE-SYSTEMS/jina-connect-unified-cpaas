name: myoperator
display_name: "MyOperator"
notes: |
  MyOperator typically issues per-account SIP endpoints — sip_realm and
  sip_proxy will be specific to your account. Confirm with MyOperator
  provisioning.

endpoint_template: |
  [{endpoint_id}]
  type=endpoint
  context=jina-voice-inbound
  disallow=all
  allow=alaw
  allow=ulaw
  auth={auth_id}
  aors={aor_id}
  from_user={sip_username}
  from_domain={sip_realm}
  dtmf_mode=rfc4733
  rtp_symmetric=yes
  force_rport=yes
  rewrite_contact=yes

auth_template: |
  [{auth_id}]
  type=auth
  auth_type=userpass
  username={sip_username}
  password={sip_password}
  realm={sip_realm}

aor_template: |
  [{aor_id}]
  type=aor
  contact=sip:{sip_proxy}
  qualify_frequency=60

registration_template: |
  [{reg_id}]
  type=registration
  outbound_auth={auth_id}
  server_uri=sip:{sip_proxy}
  client_uri=sip:{sip_username}@{sip_realm}
  retry_interval=60
