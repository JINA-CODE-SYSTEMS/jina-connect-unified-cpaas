name: vonage_sip
display_name: "Vonage SIP"
notes: |
  Vonage (Nexmo) SIP endpoint is sip.nexmo.com. Typically IP-auth
  rather than userpass — leave credentials empty and allowlist Vonage
  source IPs at your firewall.

endpoint_template: |
  [{endpoint_id}]
  type=endpoint
  context=jina-voice-inbound
  disallow=all
  allow=opus
  allow=ulaw
  auth={auth_id}
  aors={aor_id}
  from_user={sip_username}
  from_domain={sip_realm}
  dtmf_mode=rfc4733
  transport=transport-tls
  rtp_symmetric=yes
  force_rport=yes
  rewrite_contact=yes

auth_template: |
  [{auth_id}]
  type=auth
  auth_type=userpass
  username={sip_username}
  password={sip_password}
  realm={sip_realm}

aor_template: |
  [{aor_id}]
  type=aor
  contact=sip:{sip_proxy};transport=tls
  qualify_frequency=60

registration_template: ""
